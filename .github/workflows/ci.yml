name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Elm
        uses: jorelali/setup-elm@v5
        with:
          elm-version: 0.19.1

      - uses: oven-sh/setup-bun@v2

      - name: Install elm-test
        run: bun install -g elm-test@0.19.1-revision7

      - name: Test
        run: elm-test

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install elm-format
        run: bun install -g elm-format

      - name: Check formatting
        run: elm-format --validate src/ tests/
